default_install_hook_types: [pre-commit, pre-push]

repos:
    - repo: local
      hooks:
          - id: ninja-check
            name: ninja check
            entry: bash -c 'if [ "$OS" = "Windows_NT" ]; then ./tools/ninja.bat check; else ./ninja check; fi'
            language: system
            pass_filenames: false
            always_run: true
            stages: [pre-push]
          - id: prose-dash-gate
            name: prose dash gate (no em/en dashes; U+2212 needs a dash-ok marker)
            entry: python3 tools/speedrun/prose_dash_gate.py
            language: system
            pass_filenames: true
            types: [text]
            stages: [pre-commit]
            files: |
              (?x)^(
                pylib/anki/speedrun/|
                pylib/tests/|
                qt/aqt/speedrun\.py|
                rslib/src/speedrun/|
                ts/routes/|
                ts/tests/|
                tools/speedrun/|
                docs/|
                [^/]+\.md$
              )
