// SOA Exam P "Speedrun" fork. All study-readiness backend features live in this
// self-contained service to keep merges with upstream Anki low-risk.

syntax = "proto3";

option java_multiple_files = true;

package anki.speedrun;

import "anki/generic.proto";

service SpeedrunService {
  // Trivial end-to-end health check that proves the proto -> Rust -> Python
  // plumbing works. Read-only: it creates no undo entry and does not modify the
  // collection.
  rpc SpeedrunPing(generic.Empty) returns (SpeedrunPingResponse);

  // Compute exam readiness. The return type is a oneof, so a bare readiness
  // number literally cannot be emitted: below the pre-registered data threshold
  // (>= 200 graded reviews AND >= 50% coverage) it returns NoScore. The
  // give-up rule is a Rust assertion, not a UI hint.
  rpc ComputeReadiness(ComputeReadinessRequest) returns (ReadinessResult);

  // Per-subtopic mastery state for the three-tier mastery-gated scheduler:
  // gate state (from real revlog accuracy + FSRS retrievability) and which pool
  // each subtopic is in. Powers both the dashboard and the new-card ordering.
  rpc GetMasteryState(MasteryRequest) returns (MasteryState);

  // The collection's new cards, ordered by mastery tier: blocked subtopics
  // first (practised in isolation), then within-unit interleaving, then
  // cross-unit interleaving. This is the topic-aware scheduling order.
  rpc GetMasteryOrderedNewCards(MasteryRequest) returns (MasteryOrderedCards);
}

// Empty: every SpeedrunService method is collection-scoped, so codegen
// auto-forwards it to the backend (and thus to Python and the web frontend).
service BackendSpeedrunService {}

message SpeedrunPingResponse {
  // Stable marker of the form "speedrun-ok:<engine-version>".
  string marker = 1;
  // Anki engine version the backend was built from (from the repo .version).
  string engine_version = 2;
}

message ComputeReadinessRequest {
  // Full list of syllabus subtopic tags (e.g. "subtopic::univariate::binomial")
  // supplied by the Python topic map, so the curriculum is not hardcoded in the
  // engine. Defines the coverage denominator and each subtopic's unit.
  repeated string expected_subtopics = 1;
  // Per-unit relative weights (the official SOA P section weights). When
  // present, coverage is weighted by these, so skipping a high-weight section
  // cannot read as "covered". When empty, units are weighted equally.
  repeated UnitWeight units = 2;
}

message UnitWeight {
  string unit_id = 1;
  double weight = 2;
}

// A real readiness score, only ever returned once models are calibrated. Every
// field is required so a point estimate can never be shown without its context.
message ReadinessScore {
  double point = 1;
  double low = 2;
  double high = 3;
  double coverage_pct = 4;
  double confidence = 5;
  int64 updated_at = 6;
  repeated string reasons = 7;
  string next_best_action = 8;
}

// The honest "not enough data yet" state. Carries the evidence and the single
// best next action so the UI never shows a number it cannot back up.
message NoScore {
  string reason = 1;
  uint32 graded_reviews = 2;
  uint32 reviews_needed = 3;
  double coverage_pct = 4;
  string next_best_action = 5;
}

message ReadinessResult {
  oneof value {
    NoScore no_score = 1;
    ReadinessScore score = 2;
  }
}

message MasteryRequest {
  // Syllabus subtopic tags, e.g. "subtopic::univariate::binomial" (unit is the
  // middle segment). Supplied by the Python topic map.
  repeated string expected_subtopics = 1;
  // Optional per-unit weights (the official SOA section weights). Used to fall
  // back on a unit's importance when subtopic weights are absent.
  repeated UnitWeight units = 2;
  // Optional per-subtopic relative importance weights (editable emphasis
  // estimates from the topic map, authored to sum to the section weights). When
  // present, the engine reports an importance-weighted mastery rollup; when
  // absent it falls back to a plain cleared/total fraction. Weights never
  // affect the give-up thresholds.
  repeated SubtopicWeight subtopic_weights = 3;
}

message SubtopicWeight {
  string tag = 1;
  double weight = 2;
}

// Which tier a subtopic is in. Blocked -> practise in isolation; WithinUnit ->
// interleave against confusable sub-types in the same unit; CrossUnit -> the
// unit is mastered, interleave across units for spacing.
enum MasteryPool {
  MASTERY_POOL_BLOCKED = 0;
  MASTERY_POOL_WITHIN_UNIT = 1;
  MASTERY_POOL_CROSS_UNIT = 2;
}

message SubtopicMastery {
  string tag = 1;
  string unit_id = 2;
  string subtopic_id = 3;
  uint32 reviews = 4;
  uint32 correct = 5;
  double accuracy = 6;
  double mean_retrievability = 7;
  bool gate_cleared = 8;
  MasteryPool pool = 9;
  // Relative importance weight (0 when none supplied). Echoed from the request
  // so the UI can size this subtopic without a second source of truth.
  double weight = 10;
}

message UnitMastery {
  string unit_id = 1;
  uint32 subtopics_total = 2;
  uint32 subtopics_cleared = 3;
  bool mastered = 4;
  // Sum of this unit's subtopic weights (the unit's importance); 0 when none.
  double weight = 5;
  // Importance-weighted share of this unit that is gate-cleared: the fraction
  // of the unit's total weight sitting on mastered subtopics. Falls back to
  // cleared/total when no weights are supplied. MEASURED, never a predicted
  // score.
  double weighted_mastery_pct = 6;
}

// Honest, evidence-grounded rollup of gate state across the whole syllabus.
// These are MEASURED counts (what the learner has actually demonstrated via
// real reviews), never a predicted exam score: the readiness prediction stays
// in ComputeReadiness behind the give-up rule. subtopics_mastered/in_progress/
// not_started partition subtopics_total, so nothing is double-counted or
// invented.
message MasteryOverall {
  uint32 subtopics_total = 1;
  // Gate cleared: >= 10 graded problems AND >= 80% accuracy AND >= 90%
  // retrievability.
  uint32 subtopics_mastered = 2;
  // Some reviews logged but the gate is not cleared yet.
  uint32 subtopics_in_progress = 3;
  // No graded reviews yet, so there is no evidence to judge.
  uint32 subtopics_not_started = 4;
  uint32 units_total = 5;
  uint32 units_mastered = 6;
  // Total graded reviews logged on syllabus subtopic cards (evidence volume).
  uint32 total_reviews = 7;
  // Importance-weighted share of the whole syllabus that is gate-cleared: the
  // fraction of total subtopic weight sitting on mastered subtopics. Falls back
  // to mastered/total when no weights are supplied. MEASURED demonstrated
  // mastery weighted by exam importance, never a predicted exam score.
  double weighted_mastery_pct = 8;
}

message MasteryState {
  repeated SubtopicMastery subtopics = 1;
  repeated UnitMastery units = 2;
  MasteryOverall overall = 3;
}

message MasteryOrderedCards {
  repeated int64 card_ids = 1;
}
