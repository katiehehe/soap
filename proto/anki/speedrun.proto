// SOA Exam P "Speedrun" fork. All study-readiness backend features live in this
// self-contained service to keep merges with upstream Anki low-risk.

syntax = "proto3";

option java_multiple_files = true;

package anki.speedrun;

import "anki/generic.proto";

service SpeedrunService {
  // Trivial end-to-end health check that proves the proto -> Rust -> Python
  // plumbing works. Read-only: it creates no undo entry and does not modify the
  // collection.
  rpc SpeedrunPing(generic.Empty) returns (SpeedrunPingResponse);

  // Compute exam readiness. The return type is a oneof, so a bare readiness
  // number literally cannot be emitted: below the pre-registered data threshold
  // (>= 200 graded reviews AND >= 50% coverage) it returns NoScore. The
  // give-up rule is a Rust assertion, not a UI hint.
  rpc ComputeReadiness(ComputeReadinessRequest) returns (ReadinessResult);

  // Per-subtopic mastery state for the three-tier mastery-gated scheduler:
  // gate state (from real revlog accuracy + FSRS retrievability) and which pool
  // each subtopic is in. Powers both the dashboard and the new-card ordering.
  rpc GetMasteryState(MasteryRequest) returns (MasteryState);

  // The collection's new cards, ordered by mastery tier: blocked subtopics
  // first (practised in isolation), then within-unit interleaving, then
  // cross-unit interleaving. This is the topic-aware scheduling order.
  rpc GetMasteryOrderedNewCards(MasteryRequest) returns (MasteryOrderedCards);

  // Points-at-stake review order: due cards sorted by topic importance weight
  // times measured student weakness (1 - retention), so the highest-value cards
  // come first. A new review order exposed for the dashboard/reviewer; the live
  // review queue can also use it behind a flag. Weakness is measured from real
  // reviews, so this never fabricates a score.
  rpc GetPointsAtStakeOrder(MasteryRequest) returns (PointsAtStakeOrder);

  // Today's tiered study plan: the decks to study now, grouped by mastery tier
  // (blocked -> within-unit -> cross-unit), each annotated with Anki's own
  // due/new/learn counts for today. Counts are the daily-limit-capped numbers
  // the deck list already shows (MEASURED scheduler state), attributed to a
  // tier from real gate state; it never fabricates a score.
  rpc GetStudyPlan(MasteryRequest) returns (StudyPlan);

  // Coverage pace vs a target exam date: how many new (unstudied) syllabus
  // cards remain, the current new-cards/day limit, and the pace needed to
  // introduce them all before the exam. Pure arithmetic over MEASURED counts +
  // the user's exam date (config key speedrunExamDate); this is a *coverage*
  // pace, never the readiness score (that stays behind the give-up rule).
  rpc GetStudyPace(MasteryRequest) returns (StudyPace);
}

// Empty: every SpeedrunService method is collection-scoped, so codegen
// auto-forwards it to the backend (and thus to Python and the web frontend).
service BackendSpeedrunService {}

message SpeedrunPingResponse {
  // Stable marker of the form "speedrun-ok:<engine-version>".
  string marker = 1;
  // Anki engine version the backend was built from (from the repo .version).
  string engine_version = 2;
}

message ComputeReadinessRequest {
  // Full list of syllabus subtopic tags (e.g. "subtopic::univariate::binomial")
  // supplied by the Python topic map, so the curriculum is not hardcoded in the
  // engine. Defines the coverage denominator and each subtopic's unit.
  repeated string expected_subtopics = 1;
  // Per-unit relative weights (the official SOA P section weights). When
  // present, coverage is weighted by these, so skipping a high-weight section
  // cannot read as "covered". When empty, units are weighted equally.
  repeated UnitWeight units = 2;
}

message UnitWeight {
  string unit_id = 1;
  double weight = 2;
}

// A real readiness score, only ever returned once models are calibrated. Every
// field is required so a point estimate can never be shown without its context.
message ReadinessScore {
  double point = 1;
  double low = 2;
  double high = 3;
  double coverage_pct = 4;
  double confidence = 5;
  int64 updated_at = 6;
  repeated string reasons = 7;
  string next_best_action = 8;
  // How accurate past readiness guesses turned out to be, in [0, 1] (e.g. the
  // share of past predictions whose real outcome fell within the stated band).
  // Required by the honesty bundle (brief 1: "how accurate your past guesses
  // turned out to be"); only populated once readiness scores are actually
  // emitted, so today it stays 0 and the UI shows it as not-yet-available.
  double past_accuracy = 9;
}

// The honest "not enough data yet" state. Carries the evidence and the single
// best next action so the UI never shows a number it cannot back up.
message NoScore {
  string reason = 1;
  uint32 graded_reviews = 2;
  uint32 reviews_needed = 3;
  double coverage_pct = 4;
  string next_best_action = 5;
}

message ReadinessResult {
  oneof value {
    NoScore no_score = 1;
    ReadinessScore score = 2;
  }
}

message MasteryRequest {
  // Syllabus subtopic tags, e.g. "subtopic::univariate::binomial" (unit is the
  // middle segment). Supplied by the Python topic map.
  repeated string expected_subtopics = 1;
  // Optional per-unit weights (the official SOA section weights). Used to fall
  // back on a unit's importance when subtopic weights are absent.
  repeated UnitWeight units = 2;
  // Optional per-subtopic relative importance weights (editable emphasis
  // estimates from the topic map, authored to sum to the section weights). When
  // present, the engine reports an importance-weighted mastery rollup; when
  // absent it falls back to a plain cleared/total fraction. Weights never
  // affect the give-up thresholds.
  repeated SubtopicWeight subtopic_weights = 3;
}

message SubtopicWeight {
  string tag = 1;
  double weight = 2;
}

// Which tier a subtopic is in. Blocked -> practise in isolation; WithinUnit ->
// interleave against confusable sub-types in the same unit; CrossUnit -> the
// unit is mastered, interleave across units for spacing.
enum MasteryPool {
  MASTERY_POOL_BLOCKED = 0;
  MASTERY_POOL_WITHIN_UNIT = 1;
  MASTERY_POOL_CROSS_UNIT = 2;
}

message SubtopicMastery {
  string tag = 1;
  string unit_id = 2;
  string subtopic_id = 3;
  uint32 reviews = 4;
  uint32 correct = 5;
  double accuracy = 6;
  double mean_retrievability = 7;
  bool gate_cleared = 8;
  MasteryPool pool = 9;
  // Relative importance weight (0 when none supplied). Echoed from the request
  // so the UI can size this subtopic without a second source of truth.
  double weight = 10;
}

message UnitMastery {
  string unit_id = 1;
  uint32 subtopics_total = 2;
  uint32 subtopics_cleared = 3;
  bool mastered = 4;
  // Sum of this unit's subtopic weights (the unit's importance); 0 when none.
  double weight = 5;
  // Importance-weighted share of this unit that is gate-cleared: the fraction
  // of the unit's total weight sitting on mastered subtopics. Falls back to
  // cleared/total when no weights are supplied. MEASURED, never a predicted
  // score.
  double weighted_mastery_pct = 6;
}

// Honest, evidence-grounded rollup of gate state across the whole syllabus.
// These are MEASURED counts (what the learner has actually demonstrated via
// real reviews), never a predicted exam score: the readiness prediction stays
// in ComputeReadiness behind the give-up rule. subtopics_mastered/in_progress/
// not_started partition subtopics_total, so nothing is double-counted or
// invented.
message MasteryOverall {
  uint32 subtopics_total = 1;
  // Gate cleared: >= 10 graded problems AND >= 80% accuracy AND >= 90%
  // retrievability.
  uint32 subtopics_mastered = 2;
  // Some reviews logged but the gate is not cleared yet.
  uint32 subtopics_in_progress = 3;
  // No graded reviews yet, so there is no evidence to judge.
  uint32 subtopics_not_started = 4;
  uint32 units_total = 5;
  uint32 units_mastered = 6;
  // Total graded reviews logged on syllabus subtopic cards (evidence volume).
  uint32 total_reviews = 7;
  // Importance-weighted share of the whole syllabus that is gate-cleared: the
  // fraction of total subtopic weight sitting on mastered subtopics. Falls back
  // to mastered/total when no weights are supplied. MEASURED demonstrated
  // mastery weighted by exam importance, never a predicted exam score.
  double weighted_mastery_pct = 8;
}

// A ranked "what to study next" suggestion: importance weight times measured
// opportunity (how far a subtopic is from clearing its gate). Cleared subtopics
// are omitted. Ranking only reorders MEASURED state by exam importance; it
// never invents a score.
message StudyPriority {
  string tag = 1;
  string unit_id = 2;
  string subtopic_id = 3;
  double weight = 4;
  double priority_score = 5;
  string reason = 6;
}

// Which tier of practice to recommend next, so study progresses block ->
// within-unit interleave -> cross-unit interleave rather than staying blocked.
enum StudyMode {
  STUDY_MODE_BLOCKED = 0;       // practise one subtopic in isolation
  STUDY_MODE_WITHIN_UNIT = 1;   // interleave a unit's confusable sub-types
  STUDY_MODE_CROSS_UNIT = 2;    // interleave across units (spacing)
  STUDY_MODE_ALL_MASTERED = 3;  // nothing left to clear; review everything
}

// The single recommended next study action, derived from measured mastery. The
// target is a subtopic (BLOCKED), a unit (WITHIN_UNIT), or the whole exam
// (CROSS_UNIT / ALL_MASTERED). Never fabricated: it only reflects the gate
// state.
message StudyRecommendation {
  StudyMode mode = 1;
  string subtopic_tag = 2;  // set for BLOCKED
  string unit_id = 3;       // set for WITHIN_UNIT
}

message MasteryState {
  repeated SubtopicMastery subtopics = 1;
  repeated UnitMastery units = 2;
  MasteryOverall overall = 3;
  // Subtopics still worth studying, highest-impact first (weight x
  // opportunity). Empty once everything is mastered.
  repeated StudyPriority priorities = 4;
  // The tier-aware "what to study next" recommendation.
  StudyRecommendation recommendation = 5;
}

message MasteryOrderedCards {
  repeated int64 card_ids = 1;
}

// One due card scored by "points at stake": its subtopic's importance weight
// times the student's measured weakness on that subtopic (1 - mean retention).
message PointsAtStakeCard {
  int64 card_id = 1;
  string tag = 2;
  double weight = 3;
  // Measured weakness in [0, 1]: 1 - mean FSRS retrievability for the subtopic
  // (0.5 when there is no retention evidence yet). Never a fabricated value.
  double weakness = 4;
  // weight * weakness. Higher = more valuable to review now.
  double stakes = 5;
}

// Due cards in points-at-stake order, highest stakes first (ties broken by the
// more-urgent card). This is the "highest-value cards first" review order.
message PointsAtStakeOrder {
  repeated PointsAtStakeCard cards = 1;
}

// One deck to study now, at a given tier, carrying today's real counts from
// Anki's deck tree (daily-limit capped, i.e. the same numbers the deck list
// shows). The tier comes from the measured gate state, so the plan never
// invents a score. new/review/learn are today's due counts; total is the
// deck's whole-subtree size for context.
message StudyPlanItem {
  StudyMode tier = 1;
  int64 deck_id = 2;
  string deck_name = 3;
  // Set for BLOCKED (a single subtopic's deck).
  string subtopic_tag = 4;
  // Set for WITHIN_UNIT (a whole unit's deck).
  string unit_id = 5;
  uint32 new_count = 6;
  uint32 review_count = 7;
  uint32 learn_count = 8;
  uint32 total_including_children = 9;
}

// The tiered "what to study today" plan: the decks with something due today,
// grouped by tier and ordered blocked -> within-unit -> cross-unit. Empty when
// nothing is due (the honest "you're caught up" state).
message StudyPlan {
  repeated StudyPlanItem items = 1;
}

// Coverage pace vs a target exam date. All fields are MEASURED counts or plain
// arithmetic over them + the user's exam date; this is a syllabus-coverage
// pace, NOT a predicted exam score.
message StudyPace {
  // Whether the user has set an exam date (config key speedrunExamDate).
  bool has_exam_date = 1;
  // The exam date as a unix timestamp (local noon of the day), echoed back.
  int64 exam_timestamp = 2;
  // Whole days from now to the exam (can be negative if the date has passed).
  int64 days_left = 3;
  // New (unstudied) syllabus cards still to be introduced.
  uint32 remaining_new = 4;
  // The current new-cards/day limit on the exam deck (0 if unknown).
  uint32 current_new_per_day = 5;
  // New cards/day needed to introduce all remaining before the exam
  // (ceil(remaining / days_left)); equals remaining when the exam is
  // today/past.
  uint32 recommended_new_per_day = 6;
  // Days to finish introducing all new cards at the current pace
  // (ceil(remaining / current_new_per_day)); 0 when the pace is unknown.
  uint32 projected_days_to_finish = 7;
  // True when, at the current pace, all new cards are introduced on/before the
  // exam (or nothing is left to introduce). Always false without an exam date.
  bool on_track = 8;
}
